<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  
  <div class="card p-4 shadow-lg w-100" style="max-width: 400px;">
    <h3 class="text-center mb-4">Login</h3>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input
          type="email"
          class="form-control"
          placeholder="Enter your email"
          formControlName="email"
        />
        <div class="text-danger mt-1" *ngIf="f['email'].touched && f['email'].errors">
          <small *ngIf="f['email'].errors['required']">Email is required</small>
          <small *ngIf="f['email'].errors['email']">Enter a valid email</small>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="Enter your password"
          formControlName="password"
        />
        <div class="text-danger mt-1" *ngIf="f['password'].touched && f['password'].errors">
          <small *ngIf="f['password'].errors['required']">Password is required</small>
          <small *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</small>
        </div>
      </div>

      <button class="btn btn-success w-100 mt-2" [disabled]="loginForm.invalid">
        Login
      </button>
    </form>

    <!-- <div class="text-danger text-center mt-3" *ngIf="error">
      <small>{{ error }}</small>
    </div> -->

    <div class="text-center mt-3">
      <small>
        Don't have an account? 
        <a routerLink="/register">Register</a>
      </small>
    </div>

  </div>
</div>
