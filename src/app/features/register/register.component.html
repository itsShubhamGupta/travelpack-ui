<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="card p-4 shadow-lg w-100" style="max-width: 400px;">

    <h3 class="text-center mb-4">Register</h3>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input class="form-control"
               placeholder="Enter your name"
               formControlName="name">
        <small class="text-danger" *ngIf="f['name'].touched && f['name'].errors">
          Name must be at least 3 characters
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input class="form-control"
               placeholder="name@example.com"
               formControlName="email">
        <small class="text-danger" *ngIf="f['email'].touched && f['email'].errors">
          Enter valid email
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password"
               class="form-control"
               placeholder="Create a password"
               formControlName="password">
        <small class="text-danger" *ngIf="f['password'].touched && f['password'].errors">
          Minimum 6 characters
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input class="form-control"
               placeholder="10 digit mobile number"
               formControlName="phone">
        <small class="text-danger" *ngIf="f['phone'].touched && f['phone'].errors">
          Enter valid 10 digit number
        </small>
      </div>

      <button class="btn btn-success w-100 mt-2" [disabled]="registerForm.invalid">
        Register
      </button>

    </form>

    <div class="text-center mt-3">
      <small>
        Already have an account?
        <a routerLink="/login">Login</a>
      </small>
    </div>

  </div>
</div>
