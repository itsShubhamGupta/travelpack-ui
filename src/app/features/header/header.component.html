<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

  <div class="container">

    <!-- Brand -->
    <span class="navbar-brand fw-bold" >
       TravelPack
    </span>  

    <!-- Toggle (mobile) -->
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="nav">

      <!-- Left -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item" *ngIf="auth.isLoggedIn()">
          <a class="nav-link" routerLink="/package-list">Packages</a>
        </li>

        <li class="nav-item" *ngIf="auth.isLoggedIn()">
          <a class="nav-link" routerLink="/my-bookings">My Bookings</a>
        </li>
        <li class="nav-item" *ngIf="auth.isAdmin()">
          <a class="nav-link" routerLink="/add-package">Add Package</a>
        </li>
      </ul>

      <!-- Right -->
      <div class="d-flex align-items-center">

        <!-- NOT LOGGED -->
        <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">

          <a class="btn btn-outline-light me-2" routerLink="/login">
            Login
          </a>

          <a class="btn btn-warning" routerLink="/register">
            Register
          </a>

        </ng-container>

        <!-- LOGGED IN -->
        <ng-template #loggedIn>

          <span class="text-white me-3">
            Hi, {{ auth.getName() }}
          </span>

          <button class="btn btn-danger" (click)="logout()">
            Logout
          </button>

        </ng-template>

      </div>

    </div>

  </div>

</nav>
