<div class="container mt-4" *ngIf="package">

  <div class="row">

    <!-- LEFT: IMAGE -->
    <div class="col-md-6">
      <img [src]="package.imageUrl"
           class="img-fluid rounded shadow"
           style="width: 100%; height: 350px; object-fit: cover;">
    </div>

    <!-- RIGHT: DETAILS -->
    <div class="col-md-6">

      <h2 class="fw-bold">{{ package.title }}</h2>

      <p class="text-muted">📍 {{ package.location }}</p>

      <h4 class="text-success fw-bold">
        ₹ {{ package.price }}
      </h4>

      <p>
        <strong>Duration:</strong> {{ package.duration }} Days
      </p>

      <p class="mt-3">
        {{ package.description }}
      </p>

      <!-- BOOK BUTTON -->
      <button class="btn btn-primary mt-3 w-100"
              (click)="bookNow()">
        Book Now
      </button>

    </div>

  </div>

  <!-- ITINERARY -->
  <div class="mt-5">

    <h4 class="fw-bold mb-3">Itinerary</h4>

    <div class="card mb-2"
         *ngFor="let i of package.itineraries">

      <div class="card-body">
        <strong>Day {{ i.dayNumber }}:</strong>
        {{ i.details }}
      </div>

    </div>

  </div>

</div>
